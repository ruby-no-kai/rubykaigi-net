#!/usr/sbin/nft -f
# vim: ft=nftables
<%- overlay = node.dig(:wire, :interfaces, :overlay) -%>
<%- overlay_iface = overlay.fetch(:name) -%>

flush ruleset

table inet overlay {
  chain postrouting {
    type filter hook postrouting priority mangle; policy accept;

    oifname "<%= overlay_iface %>" ip  dscp set 0
    oifname "<%= overlay_iface %>" ip6 dscp set 0
  }


  chain input {
    type filter hook input priority filter; policy drop;

    iif lo accept
    ct state established,related accept

    ip6 nexthdr icmpv6 accept

    meta nfproto ipv6 udp dport 546 accept
<%- if overlay[:dhcpv4] -%>
    meta nfproto ipv4 udp sport 67 udp dport 68 accept
    meta nfproto ipv4 udp dport 8700-8799 accept
<%- end -%>
    meta nfproto ipv6 udp dport 8700-8799 accept

    counter
  }

  chain forward {
    type filter hook forward priority filter; policy drop;
    counter
  }

  chain output {
    type filter hook output priority filter; policy accept;
  }
}
